name: Fabric CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      fabric_env:
        description: "Target environment"
        required: true
        default: "dev"
        type: choice
        options:
          - dev
          - qa
          - prod
      source_run_id:
        description: "Optional run ID to promote from"
        required: false
        default: ""
        type: string

defaults:
  run:
    shell: bash

env:
  FABRIC_ENV: ${{ github.event.inputs.fabric_env || 'dev' }}

concurrency:
  group: fabric-cicd-${{ github.workflow }}-${{ github.ref }}-${{ github.event.inputs.fabric_env || 'dev' }}
  cancel-in-progress: true

jobs:
  lint:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run Ruff
        run: ruff check .

  test:
    runs-on: ubuntu-latest
    needs: lint
    timeout-minutes: 10
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: pytest

  validate:
    runs-on: ubuntu-latest
    needs: test
    timeout-minutes: 15
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate deployment plan via composite action
        id: plan_action
        uses: ./.github/actions/deployment-plan

      - name: Run SDK inspection
        run: python -m scripts.deploy_with_sdk

      - name: Upload deployment plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-plan-${{ github.event.inputs.fabric_env || 'dev' }}
          path: artifacts/deployment_plan.json
          retention-days: 14

      - name: Run environment validation
        run: python -m scripts.validate_fabric_env

  deploy:
    runs-on: ubuntu-latest
    needs: validate
    timeout-minutes: 10
    permissions:
      contents: read
      actions: read
    environment:
      name: ${{ github.event.inputs.fabric_env || 'dev' }}
    env:
      SOURCE_RUN_ID: ${{ github.event.inputs.source_run_id || '' }}
      SOURCE_ARTIFACT_NAME: deployment-plan-${{ github.event.inputs.fabric_env || 'dev' }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Check GitHub CLI
        if: github.event.inputs.source_run_id != ''
        run: gh --version

      - name: Authenticate GitHub CLI
        if: github.event.inputs.source_run_id != ''
        run: echo "${{ github.token }}" | gh auth login --with-token

      - name: Validate promotion inputs
        if: github.event.inputs.fabric_env == 'qa' || github.event.inputs.fabric_env == 'prod'
        run: |
          if [ -z "${SOURCE_RUN_ID}" ]; then
            echo "SOURCE_RUN_ID is required for qa/prod promotion runs."
            exit 1
          fi

      - name: Download deployment plan artifact from current run
        if: (github.event.inputs.fabric_env || 'dev') == 'dev' && github.event.inputs.source_run_id == ''
        uses: actions/download-artifact@v4
        with:
          name: deployment-plan-${{ github.event.inputs.fabric_env || 'dev' }}
          path: artifacts

      - name: Download deployment plan artifact from source run
        if: github.event.inputs.source_run_id != ''
        run: python -m scripts.download_promoted_artifact

      - name: Promote deployment plan
        if: github.event.inputs.fabric_env == 'qa' || github.event.inputs.fabric_env == 'prod'
        run: python -m scripts.promote_deployment_plan

      - name: Upload promoted deployment plan artifact
        if: github.event.inputs.fabric_env == 'qa' || github.event.inputs.fabric_env == 'prod'
        uses: actions/upload-artifact@v4
        with:
          name: promoted-deployment-plan-${{ github.event.inputs.fabric_env || 'dev' }}
          path: artifacts/promoted_deployment_plan.json

      - name: Show deployment plan
        run: cat artifacts/deployment_plan.json

      - name: Show promoted deployment plan
        if: github.event.inputs.fabric_env == 'qa' || github.event.inputs.fabric_env == 'prod'
        run: cat artifacts/promoted_deployment_plan.json

      - name: Evaluate promoted artifact
        id: artifact_gate
        run: python -m scripts.evaluate_promoted_artifact

      - name: Deployment placeholder
        if: steps.artifact_gate.outputs.deployment_allowed == 'true'
        run: |
          echo "Deploying because policy evaluation allowed deployment"

      - name: Skip deployment
        if: steps.artifact_gate.outputs.deployment_allowed != 'true'
        run: |
          echo "Skipping deployment - policy evaluation did not allow deployment"