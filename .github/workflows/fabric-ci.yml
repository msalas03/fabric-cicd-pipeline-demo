name: Fabric CI/CD Pipeline

on:
  push:
    branches: [ main ]
  workflow_dispatch:

env:
  FABRIC_ENV: dev

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run unit tests
        run: pytest

  validate:
    runs-on: ubuntu-latest
    needs: test
    outputs:
      deploy_relevant: ${{ steps.detect.outputs.deploy_relevant }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run SDK inspection
        run: python scripts/deploy_with_sdk.py

      - name: Detect changed items
        id: detect
        run: python -m scripts.detect_changed_items

      - name: Generate deployment plan
        run: python -m scripts.generate_deployment_plan

      - name: Upload deployment plan artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-plan
          path: artifacts/deployment_plan.json

      - name: Run environment validation
        run: python scripts/validate_fabric_env.py

  deploy:
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Download deployment plan artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-plan
          path: artifacts

      - name: Show deployment plan
        run: cat artifacts/deployment_plan.json

      - name: Deployment placeholder
        if: needs.validate.outputs.deploy_relevant == 'true'
        run: |
          echo "Deploying because relevant files changed"

      - name: Skip deployment
        if: needs.validate.outputs.deploy_relevant != 'true'
        run: |
          echo "Skipping deployment - no relevant changes"