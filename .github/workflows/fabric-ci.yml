name: Fabric CI Learning Workflow

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  fabric-ci:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Show Python version
        run: python --version

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install dependencies
        run: python -m pip install -r requirements.txt

      - name: Run SDK inspection
        run: python scripts/deploy_with_sdk.py

      - name: Run Fabric environment validation
        run: python scripts/validate_fabric_env.py
        continue-on-error: true